<button class="keeper-btn{% if player.is_kept %} keeper-active{% endif %}"
        data-player-key="{{ player.player_key }}"
        data-team-key="{{ team.team_key }}"
        onclick="toggleKeeper(this)"
        title="{% if player.is_kept %}Remove keeper{% else %}Mark as keeper{% endif %}">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
    </svg>
</button>
